<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Speech App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .listening {
            background-color: red;
            color: white;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <!-- 1. Voice to Text කොටස -->
    <div class="section">
        <h2>Voice to Text</h2>
        <button id="micBtn">Start Mic</button>
        <p id="status">Status: Click the button to speak</p>
    </div>

    <!-- 2. Text to Voice කොටස -->
    <div class="section">
        <h2>Text to Voice</h2>
        <input type="text" id="textInput" placeholder="මොනවා හරි ටයිප් කරන්න..." />
        <button id="speakBtn">Speak (කියවන්න)</button>
    </div>

    <!-- JavaScript කොටස -->
    <script>
        // --- Voice to Text (කතා කරන දේ අකුරු කිරීම) ---
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            status.textContent = 'Browser එක Mic Support කරන්නේ නෑ. Chrome use කරපන්.';
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; // සිංහල ඕනෙනම් 'si-LK' දෙන්න
            recognition.continuous = false;
            recognition.interimResults = false;

            micBtn.addEventListener('click', () => {
                recognition.start();
                micBtn.classList.add('listening');
                status.textContent = 'Listening... Kiyapan';
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                status.textContent = `Result: ${transcript}`;
            };

            recognition.onspeechend = () => {
                recognition.stop();
                micBtn.classList.remove('listening');
            };

            recognition.onerror = (event) => {
                status.textContent = `Error එකක් ආවා: ${event.error}`;
                micBtn.classList.remove('listening');
            };
        }

        // --- Text to Voice (ලියන දේ කටහඬින් ඇසීම) ---
        const textInput = document.getElementById('textInput');
        const speakBtn = document.getElementById('speakBtn');

        speakBtn.addEventListener('click', () => {
            const text = textInput.value;

            if (text !== '') {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 1; 
                utterance.pitch = 1; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert('කරුණාකර මොනවා හරි ටයිප් කරන්න!');
            }
        });
    </script>
</body>
</html>
